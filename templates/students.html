<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Students</title>
</head>
<body>
    <a href="{{url_for('home')}}">Back to Home</a>
    
    <h1>Student List</h1>
    <table border="1">
        <tr>
            <th>id</th>
            <th>name</th>
            <th>age</th>
            <th>grade</th>
            <th>edit</th>
            <th>delete</th>
            

        </tr>
        {% for student in students %}
        <tr>
            <td>{{student[0] }}</td>
            <td>{{student[1] }}</td>
            <td>{{student[2] }}</td>
            <td>{{student[3] }}</td>
            <td>
                <a class="edit-btn" href="{{ url_for('edit_student', id=student[0]) }}">Edit</a>
            </td>
            <td>
                <a class="delete-btn" href="{{ url_for('delete_student', id=student[0]) }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
        

    </table>
</body>
</html>
