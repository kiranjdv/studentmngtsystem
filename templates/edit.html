<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
</head>
<body>
    <form method="POST">

    <label>Name</label>
    <input type="text" name="name" value="{{ student[1] }}" placeholder="Enter your name">

    <label>Age</label>
    <input type="number" name="age" value="{{ student[2] }}" placeholder="Enter your age">

    <label>Grade</label>
    <input type="text" name="grade" value="{{ student[3] }}" placeholder="Enter your grade">

    <button type="submit">Update</button>

</form>

</body>
</html>
